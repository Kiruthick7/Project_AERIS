version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: aeris_db
    environment:
      POSTGRES_USER: aeris_user
      POSTGRES_PASSWORD: aeris_password
      POSTGRES_DB: aeris
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aeris_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
